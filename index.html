<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wake Up Princess Iuliana!</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Dancing Script', cursive;
            background: linear-gradient(180deg, #0a0820 0%, #1a1040 50%, #0f0828 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            overflow: hidden;
        }

        .stars-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--d) ease-in-out infinite;
            animation-delay: var(--delay);
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.15; }
            50% { opacity: 1; }
        }

        .moon {
            position: fixed;
            top: 24px;
            right: 30px;
            width: 44px;
            height: 44px;
            background: radial-gradient(circle at 38% 38%, #fffde7, #ffd700 70%, #e6a800);
            border-radius: 50%;
            box-shadow: 0 0 18px rgba(255,215,0,0.4), 0 0 40px rgba(255,215,0,0.15);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 28px;
            padding: 28px 18px 24px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }

        h1 {
            font-family: 'Cinzel Decorative', cursive;
            color: #ffd700;
            font-size: 17px;
            letter-spacing: 1px;
            text-shadow: 0 0 16px rgba(255,215,0,0.5);
            margin-bottom: 4px;
        }

        .subtitle {
            color: rgba(255,255,255,0.6);
            font-size: 15px;
            margin-bottom: 18px;
        }

        /* Stars progress */
        .progress {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .pstar {
            font-size: 22px;
            filter: grayscale(1) brightness(0.4);
            transition: filter 0.3s, transform 0.3s;
        }

        .pstar.lit {
            filter: none;
            transform: scale(1.25);
        }

        /* Scene */
        .scene {
            position: relative;
            width: 100%;
            height: 210px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .floor {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 28px;
            background: linear-gradient(180deg, #3b2310 0%, #221209 100%);
            border-radius: 0 0 8px 8px;
        }

        /* === BED === */
        .bed-wrap {
            position: absolute;
            left: 10px;
            bottom: 24px;
        }

        .char-label {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 3px;
            text-shadow: 0 0 8px currentColor;
        }

        .label-princess { color: #ffb6d9; }
        .label-prince   { color: #93c5fd; }

        .headboard {
            width: 190px;
            height: 44px;
            background: linear-gradient(135deg, #7c3c18 0%, #a05228 55%, #7c3c18 100%);
            border-radius: 10px 10px 0 0;
            box-shadow: inset 0 2px 6px rgba(255,255,255,0.08), 0 4px 10px rgba(0,0,0,0.5);
            position: relative;
        }

        .headboard::after {
            content: '';
            position: absolute;
            inset: 8px 14px;
            background: linear-gradient(135deg, #5e2a0e 0%, #7c3c18 100%);
            border-radius: 5px;
        }

        .bed-body {
            width: 190px;
            height: 88px;
            background: linear-gradient(180deg, #f0ebe0 0%, #e0d8c8 100%);
            border-left: 6px solid #a05228;
            border-right: 6px solid #a05228;
            border-bottom: 10px solid #7c3c18;
            border-radius: 0 0 6px 6px;
            position: relative;
        }

        .pillow {
            position: absolute;
            top: 8px;
            left: 8px;
            width: 68px;
            height: 38px;
            background: linear-gradient(135deg, #fff8f0 0%, #ffeedd 100%);
            border-radius: 8px;
            box-shadow: 2px 2px 6px rgba(0,0,0,0.15);
            border: 1px solid #ffe0cc;
        }

        .blanket {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 178px;
            height: 54px;
            background: linear-gradient(135deg, #d946a8 0%, #be185d 50%, #9d174d 100%);
            border-radius: 0 0 4px 4px;
        }

        .blanket::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 12px;
            background: linear-gradient(135deg, #f0abcf 0%, #ec4899 100%);
            border-radius: 4px 4px 0 0;
        }

        /* === PRINCESS === */
        .princess-wrap {
            position: absolute;
            top: 6px;
            left: 0;
            width: 95px;
            height: 88px;
        }

        /* Head (round, on pillow) */
        .p-head {
            position: absolute;
            top: 4px;
            left: 8px;
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, #fad7a6 0%, #e8ab6a 100%);
            border-radius: 50%;
            z-index: 3;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        /* Hair behind head */
        .p-hair {
            position: absolute;
            top: 2px;
            left: 4px;
            width: 50px;
            height: 28px;
            background: linear-gradient(135deg, #f472b6 0%, #ec4899 60%, #db2777 100%);
            border-radius: 50% 50% 0 0;
            z-index: 2;
        }

        /* Tiara */
        .tiara {
            position: absolute;
            top: -4px;
            left: 10px;
            width: 22px;
            height: 11px;
            z-index: 5;
        }

        .tiara-base {
            position: absolute;
            bottom: 0;
            width: 22px;
            height: 3px;
            background: linear-gradient(90deg, #ca8a04, #fde047, #ca8a04);
            border-radius: 1px;
        }

        .t-pt {
            position: absolute;
            bottom: 2px;
            background: linear-gradient(180deg, #fde047, #ca8a04);
            border-radius: 1px 1px 0 0;
        }

        .t-pt.c { width: 4px; height: 9px; left: 9px; }
        .t-pt.l { width: 3px; height: 6px; left: 3px; }
        .t-pt.r { width: 3px; height: 6px; left: 16px; }

        .tiara-gem {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #f9a8d4;
            border-radius: 50%;
            top: 0;
            left: 9px;
            box-shadow: 0 0 4px #f9a8d4;
        }

        /* Eyes closed */
        .eye-closed-wrap {
            position: absolute;
            top: 14px;
            left: 7px;
            z-index: 4;
        }

        .ec {
            display: inline-block;
            width: 7px;
            height: 2px;
            background: #7c3d2a;
            border-radius: 0 0 3px 3px;
            margin-right: 6px;
        }

        .ec::before {
            content: '';
            display: block;
            width: 9px;
            height: 2px;
            background: #4a2316;
            border-radius: 2px;
            margin-top: -3px;
            margin-left: -1px;
        }

        /* Eyes open */
        .eye-open-wrap {
            position: absolute;
            top: 12px;
            left: 7px;
            display: none;
            z-index: 4;
        }

        .eo {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #3b1f10;
            border-radius: 50%;
            margin-right: 5px;
            position: relative;
        }

        .eo::after {
            content: '';
            position: absolute;
            width: 3px;
            height: 3px;
            background: #60a5fa;
            border-radius: 50%;
            top: 2px;
            left: 2px;
        }

        .p-smile {
            position: absolute;
            top: 23px;
            left: 10px;
            width: 14px;
            height: 6px;
            border-bottom: 2px solid #c17455;
            border-radius: 0 0 7px 7px;
            display: none;
            z-index: 4;
        }

        /* Zzz */
        .zzz-wrap {
            position: absolute;
            top: -16px;
            right: 0;
            z-index: 10;
            pointer-events: none;
        }

        .zzz-wrap span {
            display: block;
            color: rgba(255,255,255,0.85);
            font-family: 'Dancing Script', cursive;
            font-weight: 700;
            animation: zfloat 2.4s ease-in-out infinite;
            text-shadow: 0 0 5px white;
            line-height: 1;
        }

        .zzz-wrap span:nth-child(1) { font-size: 10px; animation-delay: 0s; }
        .zzz-wrap span:nth-child(2) { font-size: 13px; animation-delay: 0.5s; margin-left: 5px; }
        .zzz-wrap span:nth-child(3) { font-size: 17px; animation-delay: 1s; margin-left: 9px; }

        @keyframes zfloat {
            0%   { opacity: 0; transform: translate(0,0); }
            20%  { opacity: 1; }
            80%  { opacity: 1; }
            100% { opacity: 0; transform: translate(10px,-22px); }
        }

        /* state classes */
        .princess-wrap.sleeping .eye-closed-wrap { display: block; }
        .princess-wrap.sleeping .eye-open-wrap   { display: none; }
        .princess-wrap.sleeping .p-smile          { display: none; }
        .princess-wrap.sleeping .zzz-wrap         { display: block; }

        .princess-wrap.awake .eye-closed-wrap { display: none; }
        .princess-wrap.awake .eye-open-wrap   { display: flex; align-items: center; }
        .princess-wrap.awake .p-smile          { display: block; }
        .princess-wrap.awake .zzz-wrap         { display: none; }

        /* === PRINCE === */
        .prince-wrap {
            position: absolute;
            right: -140px;
            bottom: 24px;
            width: 95px;
            transition: right 1s cubic-bezier(0.34,1.5,0.64,1);
        }

        .prince-wrap.on { right: 8px; }

        .prince-figure {
            position: relative;
            width: 60px;
            height: 130px;
            margin: 0 auto;
        }

        /* Crown */
        .pr-crown {
            position: absolute;
            top: -9px;
            left: 8px;
            width: 26px;
            height: 12px;
            z-index: 5;
        }

        .cr-base {
            position: absolute;
            bottom: 0;
            width: 26px;
            height: 3px;
            background: linear-gradient(90deg, #ca8a04, #fde047, #ca8a04);
        }

        .cr-pt {
            position: absolute;
            bottom: 2px;
            background: linear-gradient(180deg, #fde047, #ca8a04);
            border-radius: 1px 1px 0 0;
        }

        .cr-pt.c { width: 5px; height: 10px; left: 10px; }
        .cr-pt.l { width: 4px; height: 7px; left: 3px; }
        .cr-pt.r { width: 4px; height: 7px; left: 19px; }

        .cr-gem {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #3b82f6;
            border-radius: 50%;
            top: 0;
            left: 11px;
            box-shadow: 0 0 4px #3b82f6;
        }

        .pr-hair {
            position: absolute;
            top: 5px;
            left: 6px;
            width: 40px;
            height: 20px;
            background: linear-gradient(135deg, #292524, #44302a);
            border-radius: 50% 50% 0 0;
            z-index: 3;
        }

        .pr-head {
            position: absolute;
            top: 8px;
            left: 8px;
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #fad7a6, #e8ab6a);
            border-radius: 50%;
            z-index: 2;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        .pr-eyes {
            position: absolute;
            top: 12px;
            left: 7px;
            display: flex;
            z-index: 3;
        }

        .pre {
            width: 7px;
            height: 7px;
            background: #292524;
            border-radius: 50%;
            margin-right: 5px;
            position: relative;
        }

        .pre::after {
            content: '';
            position: absolute;
            width: 3px;
            height: 3px;
            background: #60a5fa;
            border-radius: 50%;
            top: 2px;
            left: 2px;
        }

        .pr-smile {
            position: absolute;
            top: 22px;
            left: 10px;
            width: 14px;
            height: 6px;
            border-bottom: 2px solid #c17455;
            border-radius: 0 0 7px 7px;
            z-index: 3;
        }

        /* Tunic */
        .pr-body {
            position: absolute;
            top: 42px;
            left: 5px;
            width: 46px;
            height: 52px;
            background: linear-gradient(180deg, #1e3a8a, #2563eb 40%, #1e3a8a);
            border-radius: 7px 7px 4px 4px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.4);
        }

        .pr-body::before {
            content: '';
            position: absolute;
            top: 0; bottom: 0;
            left: 50%; transform: translateX(-50%);
            width: 3px;
            background: linear-gradient(180deg, #fde047, #ca8a04);
        }

        .pr-body::after {
            content: '';
            position: absolute;
            top: 8px;
            left: 4px; right: 4px;
            height: 2px;
            background: linear-gradient(90deg, #ca8a04, #fde047, #ca8a04);
        }

        /* Legs */
        .pr-legs {
            position: absolute;
            top: 92px;
            left: 10px;
            display: flex;
            gap: 4px;
        }

        .pr-leg {
            width: 15px;
            height: 28px;
            background: linear-gradient(180deg, #1e3a8a, #0f1d4a);
            border-radius: 3px;
        }

        /* Sword */
        .sword {
            position: absolute;
            top: 36px;
            right: -18px;
            width: 14px;
            height: 80px;
            transform: rotate(12deg);
            z-index: 6;
        }

        .sw-blade {
            position: absolute;
            top: 0;
            left: 5px;
            width: 4px;
            height: 52px;
            background: linear-gradient(180deg, #f1f5f9, #cbd5e1 50%, #94a3b8);
            border-radius: 2px 2px 1px 1px;
        }

        .sw-blade::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 1px;
            height: 100%;
            background: rgba(255,255,255,0.7);
            border-radius: 2px;
        }

        .sw-guard {
            position: absolute;
            top: 48px;
            left: 0;
            width: 14px;
            height: 5px;
            background: linear-gradient(90deg, #ca8a04, #fde047, #ca8a04);
            border-radius: 3px;
        }

        .sw-handle {
            position: absolute;
            top: 52px;
            left: 4px;
            width: 6px;
            height: 18px;
            background: linear-gradient(180deg, #92400e, #78350f);
            border-radius: 2px;
        }

        .sw-pommel {
            position: absolute;
            top: 68px;
            left: 2px;
            width: 10px;
            height: 10px;
            background: radial-gradient(circle at 38% 38%, #fde047, #ca8a04);
            border-radius: 50%;
        }

        /* Message */
        .msg {
            font-family: 'Dancing Script', cursive;
            font-size: 24px;
            font-weight: 700;
            color: #fde047;
            min-height: 30px;
            margin-bottom: 14px;
            opacity: 0;
            transition: opacity 0.5s;
            text-shadow: 0 0 16px rgba(253,224,71,0.6);
        }

        .msg.show { opacity: 1; }

        /* Tap button */
        .tap-btn {
            background: linear-gradient(135deg, #ec4899, #be185d);
            color: white;
            border: none;
            padding: 15px 38px;
            font-size: 17px;
            font-family: 'Dancing Script', cursive;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(236,72,153,0.45);
            animation: btnpulse 2s ease-in-out infinite;
            transition: transform 0.12s;
            -webkit-tap-highlight-color: transparent;
        }

        .tap-btn:active { transform: scale(0.94); animation: none; }

        @keyframes btnpulse {
            0%,100% { box-shadow: 0 5px 20px rgba(236,72,153,0.45); }
            50%      { box-shadow: 0 5px 32px rgba(236,72,153,0.75); }
        }

        /* Floating particles */
        .particle {
            position: absolute;
            pointer-events: none;
            font-size: 20px;
            animation: pfloat 1.2s ease-out forwards;
        }

        @keyframes pfloat {
            0%   { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-70px) scale(0.5); }
        }

        .hidden { display: none; }

        .victory-msg {
            color: rgba(255,255,255,0.88);
            font-size: 17px;
            margin-bottom: 16px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="stars-bg" id="starsEl"></div>
<div class="moon"></div>

<div class="container">
    <h1>✨ Wake Up Princess Iuliana! ✨</h1>
    <p class="subtitle">Help Prince Max save her!</p>

    <div class="progress" id="progress">
        <span class="pstar" id="ps1">⭐</span>
        <span class="pstar" id="ps2">⭐</span>
        <span class="pstar" id="ps3">⭐</span>
        <span class="pstar" id="ps4">⭐</span>
        <span class="pstar" id="ps5">⭐</span>
    </div>

    <div class="msg" id="msg"></div>

    <div class="scene" id="scene">

        <!-- BED + PRINCESS -->
        <div class="bed-wrap">
            <div class="char-label label-princess">Princess Iuliana 👑</div>
            <div class="headboard"></div>
            <div class="bed-body">
                <div class="pillow"></div>
                <div class="blanket"></div>

                <!-- Princess lying in bed -->
                <div class="princess-wrap sleeping" id="princess">
                    <div class="p-hair"></div>
                    <div class="p-head">
                        <!-- Tiara -->
                        <div class="tiara">
                            <div class="t-pt l"></div>
                            <div class="t-pt c"></div>
                            <div class="t-pt r"></div>
                            <div class="tiara-base"></div>
                            <div class="tiara-gem"></div>
                        </div>
                        <div class="eye-closed-wrap">
                            <span class="ec"></span><span class="ec"></span>
                        </div>
                        <div class="eye-open-wrap">
                            <span class="eo"></span><span class="eo"></span>
                        </div>
                        <div class="p-smile"></div>
                    </div>
                    <div class="zzz-wrap">
                        <span>z</span><span>z</span><span>Z</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- PRINCE -->
        <div class="prince-wrap" id="prince">
            <div class="char-label label-prince" style="text-align:center;margin-bottom:3px;">Prince Max ⚔️</div>
            <div class="prince-figure">
                <div class="pr-crown">
                    <div class="cr-pt l"></div>
                    <div class="cr-pt c"></div>
                    <div class="cr-pt r"></div>
                    <div class="cr-base"></div>
                    <div class="cr-gem"></div>
                </div>
                <div class="pr-hair"></div>
                <div class="pr-head">
                    <div class="pr-eyes">
                        <span class="pre"></span><span class="pre"></span>
                    </div>
                    <div class="pr-smile"></div>
                </div>
                <div class="pr-body"></div>
                <div class="pr-legs">
                    <div class="pr-leg"></div>
                    <div class="pr-leg"></div>
                </div>
                <div class="sword">
                    <div class="sw-blade"></div>
                    <div class="sw-guard"></div>
                    <div class="sw-handle"></div>
                    <div class="sw-pommel"></div>
                </div>
            </div>
        </div>

        <div class="floor"></div>
    </div>

    <div id="gameControls">
        <button class="tap-btn" onclick="tap()">💤 Tap to Wake Her! 💤</button>
    </div>

    <div id="victoryScreen" class="hidden">
        <p class="victory-msg">She's awake! 💕<br>Prince Max has come to save her!</p>
        <button class="tap-btn" onclick="resetGame()">Play Again ✨</button>
    </div>
</div>

<script>
    // Generate star background
    const starsEl = document.getElementById('starsEl');
    for (let i = 0; i < 90; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        const sz = Math.random() * 2.5 + 0.8;
        s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*3+2).toFixed(1)}s;--delay:${(Math.random()*4).toFixed(1)}s`;
        starsEl.appendChild(s);
    }

    let taps = 0;
    const MAX = 5;
    const PARTICLES = ['❤️','✨','💫','💕','⭐','🌸'];

    function tap() {
        if (taps >= MAX) return;
        taps++;
        document.getElementById('ps' + taps).classList.add('lit');
        spawnParticle();
        if (taps === MAX) setTimeout(wakeUp, 250);
    }

    function wakeUp() {
        const p = document.getElementById('princess');
        p.classList.remove('sleeping');
        p.classList.add('awake');

        const msg = document.getElementById('msg');
        msg.textContent = '✨ She\'s Awake! ✨';
        msg.classList.add('show');

        setTimeout(() => document.getElementById('prince').classList.add('on'), 350);

        for (let i = 0; i < 10; i++) setTimeout(spawnParticle, i * 90);

        setTimeout(() => {
            document.getElementById('gameControls').classList.add('hidden');
            document.getElementById('victoryScreen').classList.remove('hidden');
        }, 1600);
    }

    function spawnParticle() {
        const el = document.createElement('div');
        el.className = 'particle';
        el.textContent = PARTICLES[Math.floor(Math.random() * PARTICLES.length)];
        el.style.left = (Math.random() * 80 + 10) + '%';
        el.style.top = '55%';
        document.getElementById('scene').appendChild(el);
        setTimeout(() => el.remove(), 1200);
    }

    function resetGame() {
        taps = 0;
        for (let i = 1; i <= MAX; i++) document.getElementById('ps' + i).classList.remove('lit');
        const p = document.getElementById('princess');
        p.classList.remove('awake');
        p.classList.add('sleeping');
        document.getElementById('prince').classList.remove('on');
        const msg = document.getElementById('msg');
        msg.textContent = '';
        msg.classList.remove('show');
        document.getElementById('gameControls').classList.remove('hidden');
        document.getElementById('victoryScreen').classList.add('hidden');
    }
</script>
</body>
